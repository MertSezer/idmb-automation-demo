<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IMDb Automation Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
      background: #f7f7f7;
      color: #222;
    }
    h1 { margin-bottom: 8px; }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    button, a.btn {
      padding: 10px 16px;
      border: 1px solid #bbb;
      background: white;
      color: #222;
      text-decoration: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .full {
      grid-column: 1 / -1;
    }
    pre, #log {
      background: #111;
      color: #eee;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
    }
    #log {
      height: 380px;
      white-space: pre-wrap;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }
    th { background: #fafafa; }
    .muted { color: #666; }
    .ok { color: green; font-weight: bold; }
    .warn { color: #b26b00; font-weight: bold; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>IMDb Automation Demo</h1>
  <p class="muted">
    Film sayfası → cast satırları → profil sayfası → isim doğrulama akışını canlı izleyin.
  </p>

  <div class="actions">
    <button id="runBtn">Demo Başlat</button>
    <a class="btn" href="/report" target="_blank">HTML Report Aç</a>
    <a class="btn" href="/download/results.csv">CSV İndir</a>
    <a class="btn" href="/download/results.json">JSON İndir</a>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Çalışma Durumu</h3>
      <div id="status">Yükleniyor...</div>
    </div>

    <div class="card">
      <h3>Özet</h3>
      <pre id="summary">Henüz veri yok.</pre>
    </div>

    <div class="card full">
      <h3>Canlı Log</h3>
      <div id="log"></div>
    </div>

    <div class="card full">
      <h3>İlk 15 Sonuç</h3>
      <div id="results">Henüz veri yok.</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
